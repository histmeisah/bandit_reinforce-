# NQ Search Step-Level Replay Buffer with N-Step Returns
#
# Key Features:
#   - Step-level replay buffer for multi-step search
#   - N-step returns (outer layer): Credit over multiple search actions
#   - Token-level GAE (inner layer): Query formulation credit
#   - Priority replay: Focus on hard queries
#
# Usage:
#   python start_agentic_pipeline.py --config_path experiments/nq_search_replay/agent_nq_search_step_replay_nstep.yaml

# Replay Buffer (Step-Level with N-Step Returns + Priority)
replay:
  enabled: true
  capacity: 100000
  use_rollout_batch_size: true
  sampling_mode: step
  sample_method: uniform
  train_steps_per_env_step: 3
  skip_fresh_data: false

  # N-Step Returns Configuration
  enable_nstep: true
  n_step: 7  # Longer horizon for search
  nstep_gamma: 0.99  # γ_step for outer layer
  use_nstep_in_advantage: true  # Enable n-step in advantage computation
  use_bootstrap: false

  # Priority Experience Replay
  priority:
    function: combined
    alpha: 0.6
    use_importance_weights: true
    importance_beta: 0.4
    update_after_train: true
    update_metric: loss

# Token-Level GAE (Inner Layer)
adv_estimator: gae
gamma: 0.998  # γ_token for inner layer (very close to 1.0 for search)
lambd: 0.95
advantage_clip: 15.0
whiten_advantages: true

# Environment
train_env_manager:
  type: step
  num_env_groups: 128
  group_size: 1
  tags: [WebSearch]
  max_steps_per_episode: 20

# Training
rollout_batch_size: 256
sequence_length: 1024
max_steps: 50000
logging_steps: 20
eval_steps: 1000

# Other configs...
actor_lr: 3.0e-6
critic_lr: 1.0e-5
pg_clip: 0.2
kl_penalty: kl
reward_clip: 20.0

# Monitoring
offpolicy_monitor:
  enabled: true
  monitor_replay_batch: true

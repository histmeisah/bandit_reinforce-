defaults:
  - ../ROLL/examples/config/traj_envs_gem_math@_here_
  - ../ROLL/examples/config/deepspeed_zero2@_here_

hydra:
  run:
    dir: .
  output_subdir: null

# ============================================================================
# Experiment 1: Bandit(Thompson Sampling) + REINFORCE++
# 8x H100 GPU, Qwen3-8B-Base, Separated Mode
# ============================================================================
# GPU Layout (separated, no SYS_PTRACE / CUDA IPC needed):
#   GPU 0-5: actor_train (DeepSpeed Zero-2, 6-way optimizer sharding)
#   GPU 6-7: actor_infer (vLLM, 2 workers, NCCL weight sync)
#   GPU 0-5: reference  (share with train, ROLL auto-offloads)
# ============================================================================

exp_name: "exp1_bandit_ts_dapo_8gpu"
seed: 42
logging_dir: /mnt/project_modelware/zhaojian/weiyu/bandit_reinforce/output/logs
output_dir: /mnt/project_modelware/zhaojian/weiyu/bandit_reinforce/output

track_with: wandb
tracker_kwargs:
  project: bandit-reinforce-pp
  name: ${exp_name}
  notes: "Bandit(TS) + REINFORCE++ on DAPO-17k, Qwen3-8B-Base, 8xH100 separated"
  tags: [bandit, thompson_sampling, reinforce++, dapo_17k, qwen3_8b, 8gpu]

checkpoint_config:
  type: file_system
  output_dir: /mnt/project_modelware/zhaojian/weiyu/bandit_reinforce/output/models/${exp_name}

num_gpus_per_node: 8

max_steps: 200
save_steps: 50
logging_steps: 1
eval_steps: 20
resume_from_checkpoint: false

# 6 train GPUs: per_device_batch=2, grad_accum=8 -> effective batch = 6*2*8 = 96
rollout_batch_size: 96
val_batch_size: 48
sequence_length: 4096

advantage_clip: 20
ppo_epochs: 1
adv_estimator: "reinforce"

init_kl_coef: 0.0
whiten_advantages: true
entropy_loss_coef: 0
max_grad_norm: 1.0

pretrain: /mnt/project_modelware/zhaojian/models/pretrain/Qwen3-8B-Base
reward_pretrain: /mnt/project_modelware/zhaojian/models/pretrain/Qwen3-8B-Base

pipeline_cls: roll.pipeline.agentic.bandit_agentic_pipeline.BanditAgenticPipeline

actor_train:
  model_args:
    attn_implementation: fa2
    disable_gradient_checkpointing: false
    dtype: bf16
    model_type: ~
  training_args:
    learning_rate: 1.0e-6
    weight_decay: 0
    per_device_train_batch_size: 2
    gradient_accumulation_steps: 8
    warmup_steps: 0
    warmup_ratio: 0
    lr_scheduler_type: constant
  strategy_args:
    strategy_name: deepspeed_train
    strategy_config: ${deepspeed_zero2}
  device_mapping: "list(range(0,6))"
  infer_batch_size: 4

actor_infer:
  model_args:
    disable_gradient_checkpointing: true
    dtype: bf16
  generating_args:
    max_new_tokens: ${max_tokens_per_step}
    top_p: 0.99
    top_k: 100
    num_beams: 1
    temperature: 0.99
    num_return_sequences: 1
  strategy_args:
    strategy_name: vllm
    strategy_config:
      gpu_memory_utilization: 0.9
      block_size: 16
      load_format: auto
      max_model_len: 8192
      enforce_eager: true
      VLLM_USE_V1: 0
  device_mapping: "list(range(6,8))"

reference:
  model_args:
    attn_implementation: fa2
    disable_gradient_checkpointing: true
    dtype: bf16
    model_type: ~
  strategy_args:
    strategy_name: hf_infer
    strategy_config: ~
  device_mapping: "list(range(0,6))"
  infer_batch_size: 4

reward_normalization:
  grouping: batch
  method: identity

train_env_manager:
  max_env_num_per_worker: 16
  num_env_groups: 48
  group_size: 2
  tags: [bandit_math]
  num_groups_partition: [48]

val_env_manager:
  max_env_num_per_worker: 16
  num_env_groups: 24
  group_size: 2
  tags: [bandit_math]
  num_groups_partition: [24]

max_tokens_per_step: 2048

math_agent_system_template: "Please reason step by step, and put your final answer within '\\boxed{}', e.g. \\boxed{{A}}."
math_agent_template: "{observation}\nEnsure that your response includes the format of '\\boxed{{answer}}', e.g. \\boxed{{A}}."

custom_envs:
  bandit_math:
    env_type: "roll_math_bandit"
    max_steps: ${max_actions_per_traj}
    max_tokens_per_step: ${max_tokens_per_step}
    reward_template: ""
    env_manager_cls: ${env_manager_cls}
    agent_system_template: ${math_agent_system_template}
    agent_template: ${math_agent_template}
    env_config:
      dataset_name: /mnt/project_modelware/zhaojian/weiyu/bandit_reinforce/bandit_reinforce-/ROLL/data/dapo_math_17k.jsonl
      split: train
      question_key: prompt
      answer_key: solution
      bandit_config: {}

bandit_config:
  preset: diverse_5
  bandit_algorithm: ts
  encoder_type: transformers
  encoder_model: /mnt/project_modelware/zhaojian/models/pretrain/Qwen3-Embedding-0.6B
  encoder_device: cpu
  embedding_dim: 512
  exploration_param: 1.0
  hidden_dims: [256, 128]
  learning_rate: 0.001
  reg_param: 1.0
  l2_weight: 0.01
  buffer_size: 10000
  batch_size: 32
  update_freq: 10

replay:
  enabled: false

offpolicy_monitor:
  enabled: false

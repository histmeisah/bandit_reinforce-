# ============================================================================
# Category Descriptions
# ============================================================================
categories:
  zero_shot_cot:
    name: "Zero-Shot Chain-of-Thought"
    description: "Prompts that trigger step-by-step reasoning without examples"
    key_papers:
      - "Large Language Models are Zero-Shot Reasoners (Kojima et al., 2022)"
      - "Automatic Prompt Engineer (Zhou et al., 2022)"

  plan_and_solve:
    name: "Plan-and-Solve"
    description: "Two-stage prompts: first plan, then execute"
    key_papers:
      - "Plan-and-Solve Prompting (Wang et al., 2023)"

  detailed_reasoning:
    name: "Detailed Reasoning"
    description: "Prompts requesting comprehensive explanations"

  verification:
    name: "Verification"
    description: "Prompts that encourage self-checking and verification"
    key_papers:
      - "Self-Consistency Improves Chain of Thought (Wang et al., 2022)"

  structured:
    name: "Structured Format"
    description: "Prompts with explicit output structure"

  direct:
    name: "Direct/Baseline"
    description: "Minimal prompts without reasoning scaffolding"

  metacognitive:
    name: "Metacognitive"
    description: "Prompts that encourage reflection and analogical thinking"